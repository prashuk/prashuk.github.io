<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baby Shower RSVP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="pearls" aria-hidden="true">
    <span class="pearl pearl-1"></span>
    <span class="pearl pearl-2"></span>
    <span class="pearl pearl-3"></span>
    <span class="pearl pearl-4"></span>
    <span class="pearl pearl-5"></span>
    <span class="pearl pearl-6"></span>
    <span class="pearl pearl-7"></span>
    <span class="pearl pearl-8"></span>
  </div>

  <main class="card">
    <header class="hero">
      <div class="photo-frame" aria-hidden="true">
        <span class="frame-glow"></span>
      </div>
      <img
        src="assets/baby-shower-photo.jpg"
        alt="Baby shower celebration"
        class="hero-photo"
        id="heroPhoto"
        onerror="this.src='assets/placeholder-photo.svg'"
      />
      <div class="hero-overlay">
        <p class="eyebrow">You're invited</p>
        <h1>Baby Shower</h1>
        <p class="subtitle">Pearls &amp; Little Blessings</p>
        <p class="event-date" id="eventDate">Saturday, June 14, 2026 · 2:00 PM</p>
      </div>
    </header>

    <section class="form-section">
      <h2>RSVP</h2>
      <p class="form-intro">We can't wait to celebrate with you. Please respond by <strong>June 1, 2026</strong>.</p>

      <form id="rsvpForm" novalidate>
        <div class="field">
          <label for="fullName">Full name <span class="req">*</span></label>
          <input type="text" id="fullName" name="fullName" required autocomplete="name" placeholder="Your name" />
        </div>

        <div class="field">
          <label for="email">Email <span class="req">*</span></label>
          <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@email.com" />
        </div>

        <div class="field">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" autocomplete="tel" placeholder="(555) 123-4567" />
        </div>

        <div class="field">
          <label>Will you attend? <span class="req">*</span></label>
          <div class="radio-group" role="radiogroup" aria-required="true">
            <label class="radio-pill">
              <input type="radio" name="attending" value="Yes" required />
              <span>Joyfully yes</span>
            </label>
            <label class="radio-pill">
              <input type="radio" name="attending" value="No" />
              <span>Regretfully no</span>
            </label>
            <label class="radio-pill">
              <input type="radio" name="attending" value="Maybe" />
              <span>Not sure yet</span>
            </label>
          </div>
        </div>

        <div class="field" id="guestCountField">
          <label for="guestCount">Number of guests (including you)</label>
          <select id="guestCount" name="guestCount">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5+</option>
          </select>
        </div>

        <div class="field">
          <label for="dietary">Dietary restrictions or allergies</label>
          <textarea id="dietary" name="dietary" rows="2" placeholder="Optional"></textarea>
        </div>

        <div class="field">
          <label for="message">Message for the parents-to-be</label>
          <textarea id="message" name="message" rows="3" placeholder="We'd love to hear from you"></textarea>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <span class="btn-text">Send RSVP</span>
          <span class="btn-spinner" hidden aria-hidden="true"></span>
        </button>
      </form>

      <p id="formStatus" class="form-status" role="status" aria-live="polite"></p>
    </section>

    <footer class="card-footer">
      <p>With love · Pearl-themed celebration</p>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
